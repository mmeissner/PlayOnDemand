name: pod_operator_mobile
description: PlayOnDemand operator daily-ops app — modern Dart 3 port of the legacy leap_play_x_app, intended for floor staff to start/stop sessions and watch station state from a phone or tablet.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
