server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static SPA: serve files, fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
        # Flutter web's CanvasKit/JS chunks are immutable per build hash.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Proxy API to the Pod.Web.Center server container on the docker-compose
    # network alias "server" port 80. Same scheme as flutter_operator.
    location /api/ {
        proxy_pass http://server:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://server:80;
    }
}
