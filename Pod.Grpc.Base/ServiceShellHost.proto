syntax = "proto3";
package Pod.Grpc.ShellHost;

import "MessagesShellHost.proto";

service ShellHostServiceGrpc {
    //Request to Server from a Client to Connect  
    rpc Connect (Pod.Grpc.Messages.ShellHost.ConnectRequest) returns (Pod.Grpc.Messages.ShellHost.ConnectResponse){}
    //Get Server to Client stream providing Server Notifications/Messages
    rpc GetNotifications(Pod.Grpc.Messages.ShellHost.NotificationRequest) returns (stream Pod.Grpc.Messages.ShellHost.ClientNotification) {}


    //Receive Server Settings/Rules that need to be followed by Client
    rpc GetServerSettings (Pod.Grpc.Messages.ShellHost.ServerSettingsRequest) returns (Pod.Grpc.Messages.ShellHost.ServerSettingsResponse){}
    //Receive Client Settings as Names, Modes and so on
    rpc GetClientSettings (Pod.Grpc.Messages.ShellHost.ClientSettingsRequest) returns (Pod.Grpc.Messages.ShellHost.ClientSettingsResponse){}
    //Sends an Heartbeat to the Server as keep alive signal on Server Side
    rpc SendHeartbeat(Pod.Grpc.Messages.ShellHost.HeartbeatRequest)returns(Pod.Grpc.Messages.ShellHost.HeartbeatResponse){};

    //Create request for a new Login Intention
    rpc SendLoginIntention(Pod.Grpc.Messages.ShellHost.LoginRequest)returns(Pod.Grpc.Messages.ShellHost.LoginRequestResponse){};
    //Receive a pending Login Intention 
    rpc GetLoginIntention(Pod.Grpc.Messages.ShellHost.RequestedLoginRequest)returns(Pod.Grpc.Messages.ShellHost.RequestedLoginResponse){};
    
    //Send a response for a Login Intention 
    rpc SendLoginResponse(Pod.Grpc.Messages.ShellHost.LoginIntentionReplyRequest)returns(Pod.Grpc.Messages.ShellHost.LoginIntentionReplyResponse){}
    //Receive current Session State if one is availible
    rpc GetSessionState(Pod.Grpc.Messages.ShellHost.SessionStateRequest)returns(Pod.Grpc.Messages.ShellHost.SessionStateResponse){}
    //Send Logout from an current Session
    rpc SendLogoutRequest(Pod.Grpc.Messages.ShellHost.LogoutRequest)returns(Pod.Grpc.Messages.ShellHost.LogoutResponse){}


    //Inform Server about Client is Disconnecting
    rpc Disconnect(Pod.Grpc.Messages.ShellHost.DisconnectRequest)returns(Pod.Grpc.Messages.ShellHost.DisconnectResponse){}
}